# Parameter Binding and Relationships
parameter_bindings:
  # Define groups of parameters that must be used together
  customer_identity_binding:
    description: "CIF code and Netbank ID must match for the same customer"
    bound_parameters: ["cif_code", "netbank_id"]
    valid_combinations:
      - { cif_code: "545269", netbank_id: "88837700" }
      - { cif_code: "464013", netbank_id: "61420376" }
  # TODO: Re-enable once we can support multiple bindings
  # frequency_and_restart_cycle_date_binding:
  #   description: "Frequency and restart cycle date should be used together"
  #   bound_parameters: ["frequency", "cycle_restart_date"]
  #   valid_combinations:
  #     - { frequency: "WEEKLY", cycle_restart_date: "2025-09-01T00:00:00" }
  #     - { frequency: "FORTNIGHTLY", cycle_restart_date: "2025-09-01T00:00:00" }
  #     - { frequency: "MONTHLY", cycle_restart_date: "2025-09-01T00:00:00" }

  account_customer_binding:
