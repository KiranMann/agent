  date_range_binding:
    description: "From date must be before to date"
    bound_parameters: ["from_date", "to_date"]
    constraint_type: "date_range"  # Special constraint type
    valid_combinations:
      - { from_date: "2023-09-24", to_date: "2025-09-24" }

# Configuration for test data generation
generation_config:
  # Output format for generated test data
  output_format: "json"  # Options: "json", "yaml", "csv"

  # Parameter generation mode
  parameter_mode: "all"  # Options: "all", "required_only", "custom"

  # Test case generation limits
  limits:
    max_combinations_per_api: 100000  # Maximum test cases per API method
    max_bound_combinations: 100000  # Maximum bound parameter combinations
    max_independent_combinations: 100000  # Maximum independent parameter combinations
