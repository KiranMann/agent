# Savings Agent Mock Service Configuration
# This YAML file defines API methods and their input parameters for generating test inputs and outputs
# for the Savings Agent specifically
#

# Parameter Definitions
# Define the possible values for reusable parameters
parameter_definitions:
  cba_device_id:
    description: "Device identifier for CBA applications"
    possible_values:
      - "IO-Recorder"
    default: "IO-Recorder"
  cba_client_ip:
    description: "Client IP address for CBA applications"
    possible_values:
      - "127.0.0.1"
    default: "127.0.0.1"
  referer:
    description: "HTTP referer header for API requests"
    possible_values:
      - "https://www.commbank.com.au/netbank"
    default: "https://www.commbank.com.au/netbank"
  correlation_id:
    description: "Unique correlation ID for request tracking"
    possible_values:
      - "test-correlation-001"
    default: "test-correlation-001"
  session_id:
    description: "Session identifier for user session tracking"
    possible_values:
      - "test-session-001"
    default: "test-session-001"

service_modules:
  api_services.cashflow_service:
    service_classes:
      CashflowService:
        methods:
          get_account_settings:
            # Use parameter binding for customer identity
            parameter_binding: "customer_identity_binding"
            cba_device_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            cba_client_ip:
              type: "str"
              is_optional: true
              values: []  # Will use values from parameter_definitions
            # Session and tracking parameters
            referer:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            correlation_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            session_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions

          get_all_account_transactions:
            # Use combined binding for customer + account + date range
            parameter_binding: ["account_customer_binding", "date_range_binding"]
            # Note: account_hash will be dynamically generated based on customer binding
            cba_device_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            cba_client_ip:
              type: "str"
              is_optional: true
              values: []  # Will use values from parameter_definitions
            # Session and tracking parameters
            referer:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            correlation_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            session_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions

  api_services.spendlimits_service:
    service_classes:
      SpendLimitsService:
        methods:
          get_cycle_settings:
            # Use parameter binding for customer identity
            parameter_binding: "customer_identity_binding"
            cba_client_ip:
              type: "str"
              is_optional: true
              values: []  # Will use values from parameter_definitions
            # Session and tracking parameters
            referer:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            correlation_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            session_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions

          update_cycle_settings:
            # Use parameter binding for customer identity
            parameter_binding: "customer_identity_binding"
            # Method-specific required parameters
            cycle_settings:
              type: "dict"  # Complex object with nested enum and datetime
              is_optional: false
              values:
                - frequency:
                    type: "enum"
                    enum_class: "all_agents.task_agents.savings_agent.tools.models.Frequency"
                    is_optional: false
                    values:
                      - "WEEKLY"
                      - "FORTNIGHTLY"
                      - "MONTHLY"
                  cycleSeedDate:
                    type: "datetime"
                    is_optional: false
                    values:
                      - "2025-09-01T00:00:00"
            # Session and tracking parameters (REQUIRED for this method)
            referer:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            correlation_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            session_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            # Optional parameters
            cba_client_ip:
              type: "str"
              is_optional: true
              values: []  # Will use values from parameter_definitions

          get_all_categories:
            # Use parameter binding for customer identity
            parameter_binding: "customer_identity_binding"
            cba_client_ip:
              type: "str"
              is_optional: true
              values: []  # Will use values from parameter_definitions
            # Session and tracking parameters
            referer:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            correlation_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            session_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions

          get_category_transactions:
            # Use parameter binding for customer identity
            parameter_binding: "customer_identity_binding"

            # Method-specific required parameters
            category:
              type: "str"
              is_optional: false
              values:
                - "Groceries"
                - "Entertainment"
                - "Shopping"
            # Session and tracking parameters (REQUIRED for this method)
            referer:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            correlation_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            session_id:
              type: "str"
              is_optional: false
              values: []  # Will use values from parameter_definitions
            # Optional parameters
            cba_client_ip:
              type: "str"
              is_optional: true
              values: []  # Will use values from parameter_definitions
            cycle_index:
              type: "int"
              is_optional: true
              values:
                - 0
                - 1
                - 2
            frequency:
              type: "enum"
              enum_class: "all_agents.task_agents.savings_agent.tools.models.Frequency"
              is_optional: true
              values:
                - "WEEKLY"
                - "FORTNIGHTLY"
                - "MONTHLY"
            cycle_restart_date:
              type: "datetime"
              is_optional: true
              values:
                - "2025-09-01T00:00:00"

